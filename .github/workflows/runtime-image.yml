name: Runtime image

# Construit et publie l'image de base Vignemale (runtime déjà compilé) sur GHCR,
# multi-arch. `vignemale build` en part → builds d'app en quelques secondes.
#
# Déclenchée sur tag de version (vX.Y.Z) et manuellement. Pas sur chaque push :
# une compilation Rust par release suffit.
#
# Parallélisation : un job par plateforme (amd64 / arm64) qui pousse PAR DIGEST,
# puis un job `merge` qui assemble le manifeste multi-arch. Les deux builds
# tournent en même temps → temps mur ≈ le plus lent, pas la somme.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          # arm64 DÉSACTIVÉ : en QEMU émulé sur runner amd64, la compilation Rust
          # fat-LTO prend >1h (impraticable). Scaleway = amd64, donc inutile pour
          # le deploy. Pour le rebrancher (dev local Mac arm64), utiliser un runner
          # ARM NATIF — décommenter quand le plan GitHub en dispose :
          # - platform: linux/arm64
          #   runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Nom d'image (GHCR exige des minuscules)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vignemale-python" >> "$GITHUB_ENV"

      - name: Clé de plateforme (cache / artefact)
        run: echo "PLATFORM_KEY=${MATRIX_PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runtime.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_KEY }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_KEY }}

      - name: Exporte le digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_KEY }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Nom d'image (GHCR exige des minuscules)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vignemale-python" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Assemble le manifeste multi-arch et pousse
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Vérifie
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:latest
