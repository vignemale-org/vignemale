name: Runtime image

# Builds and publishes the Vignemale base image (runtime already compiled) to
# GHCR, multi-arch. `vignemale build` starts from it → app builds in a few seconds.
#
# Triggered on a version tag (vX.Y.Z) and manually. Not on every push:
# one Rust compilation per release is enough.
#
# Parallelization: one job per platform (amd64 / arm64) that pushes BY DIGEST,
# then a `merge` job that assembles the multi-arch manifest. Both builds run at
# the same time → wall time ≈ the slowest, not the sum.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          # arm64 DISABLED: under emulated QEMU on an amd64 runner, the fat-LTO
          # Rust compilation takes >1h (impractical). Scaleway = amd64, so useless
          # for the deploy. To wire it back (local dev on Mac arm64), use a NATIVE
          # ARM runner — uncomment when the GitHub plan provides one:
          # - platform: linux/arm64
          #   runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vignemale-python" >> "$GITHUB_ENV"

      - name: Platform key (cache / artifact)
        run: echo "PLATFORM_KEY=${MATRIX_PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runtime.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_KEY }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_KEY }}

      - name: Export the digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_KEY }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Image name (GHCR requires lowercase)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vignemale-python" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Assemble the multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Verify
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:latest
