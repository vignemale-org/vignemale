name: Runtime image

# Construit et publie l'image de base Vignemale (runtime déjà compilé) sur GHCR,
# multi-arch. `vignemale build` en part → builds d'app en quelques secondes.
#
# Déclenchée sur tag de version (vX.Y.Z) et manuellement. Pas sur chaque push :
# la compilation Rust en arm64 émulé (QEMU) est lente — réservée aux releases.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Nom d'image (GHCR exige des minuscules)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/vignemale-python" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runtime.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
