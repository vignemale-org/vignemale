name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: vignemale
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # Pas de setup-protoc : le build.rs vendore protoc (protoc-bin-vendored).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Tests Rust (core)
        run: cargo test

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build binding PyO3 + SDK + CLI (un seul paquet, extras dev)
        working-directory: runtimes/python
        run: pip install ".[dev]"

      - name: Tests Python (pytest)
        working-directory: runtimes/python
        env:
          VIGNEMALE_TEST_PG: postgres://postgres:vignemale@127.0.0.1:5432/postgres
        run: python -m pytest tests/ -v
