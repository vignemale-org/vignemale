name: Release PyPI

# Publie sur PyPI sur tag de version (vX.Y.Z) :
#   - vignemale : wheels abi3 multi-plateformes (runtime Rust+PyO3 + CLI inclus) + sdist
# Auth : Trusted Publishing (OIDC, pas de token) — configurer le publisher sur
# PyPI (et/ou TestPyPI) pour le projet `vignemale` (org vignemale-org / repo
# vignemale / ce workflow / environnement « pypi »).
#
# - tag vX.Y.Z         → publie sur PyPI (réel)
# - run manuel (UI)    → choisir la cible : testpypi (essai blanc) ou pypi

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Cible de publication"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  # ---- wheels du runtime (abi3 : un wheel par plateforme couvre Python ≥ 3.9) ----
  wheels:
    name: wheels ${{ matrix.os }}/${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          # aarch64 sur runner ARM64 NATIF (gratuit pour repos publics) : la
          # cross-compilation via conteneur émulé casse dès qu'une dep compile du
          # C/asm (ring, aws-lc…). En natif, tout compile normalement.
          - { os: ubuntu-24.04-arm, target: aarch64 }
          # macOS : un seul runner arm64 (macos-latest), les DEUX arch par
          # cross-compilation (clang + SDK Apple universel = cross fiable, contrairement
          # à Linux). Évite le runner macOS Intel, rare et lent en file d'attente.
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4

      # Pas d'install protoc : le build.rs du runtime utilise un protoc vendoré
      # (crate protoc-bin-vendored), hermétique sur tous les OS/arch (y compris
      # le conteneur manylinux et la cross-compilation aarch64). TLS Postgres en
      # rustls → pas d'OpenSSL système non plus.
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: runtimes/python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: runtimes/python/dist/*.whl

  # ---- sdist du runtime + paquets pur-Python (cli, deploy) ----
  sdist-pure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: sdist du runtime (SDK + CLI dans un seul paquet)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: runtimes/python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: runtimes/python/dist/*

  # ---- publication PyPI (Trusted Publishing, OIDC) ----
  publish:
    needs: [wheels, sdist-pure]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      # essai blanc : run manuel avec target=testpypi
      - name: publier sur TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

      # réel : sur tag vX.Y.Z, ou run manuel avec target=pypi.
      # Auth par token API (secret PYPI_API_TOKEN) — pas besoin de configurer le
      # Trusted Publisher. À durcir plus tard : remplacer le token « compte » par
      # un token « projet » (possible maintenant que vignemale existe sur PyPI).
      - name: publier sur PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
