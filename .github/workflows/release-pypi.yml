name: Release PyPI

# Publishes to PyPI on a version tag (vX.Y.Z):
#   - vignemale: multi-platform abi3 wheels (Rust+PyO3 runtime + CLI included) + sdist
# Auth: Trusted Publishing (OIDC, no token) — configure the publisher on
# PyPI (and/or TestPyPI) for the `vignemale` project (org vignemale-org / repo
# vignemale / this workflow / environment "pypi").
#
# - tag vX.Y.Z         → publishes to PyPI (real)
# - manual run (UI)    → choose the target: testpypi (dry run) or pypi

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publication target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  # ---- runtime wheels (abi3: one wheel per platform covers Python ≥ 3.9) ----
  wheels:
    name: wheels ${{ matrix.os }}/${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          # aarch64 on a NATIVE ARM64 runner (free for public repos): cross-
          # compilation via an emulated container breaks as soon as a dep compiles
          # C/asm (ring, aws-lc…). Natively, everything compiles normally.
          - { os: ubuntu-24.04-arm, target: aarch64 }
          # macOS: a single arm64 runner (macos-latest), BOTH arches via
          # cross-compilation (clang + universal Apple SDK = reliable cross, unlike
          # Linux). Avoids the macOS Intel runner, rare and slow in the queue.
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4

      # No protoc install: the runtime's build.rs uses a vendored protoc
      # (crate protoc-bin-vendored), hermetic on all OS/arch (including the
      # manylinux container and aarch64 cross-compilation). Postgres TLS via
      # rustls → no system OpenSSL either.
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: runtimes/python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: runtimes/python/dist/*.whl

  # ---- runtime sdist + pure-Python packages (cli, deploy) ----
  sdist-pure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: runtime sdist (SDK + CLI in a single package)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: runtimes/python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: runtimes/python/dist/*

  # ---- PyPI publication (Trusted Publishing, OIDC) ----
  publish:
    needs: [wheels, sdist-pure]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      # dry run: manual run with target=testpypi
      - name: publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

      # real: on tag vX.Y.Z, or a manual run with target=pypi.
      # Auth via API token (secret PYPI_API_TOKEN) — no need to configure the
      # Trusted Publisher. To harden later: replace the "account" token with a
      # "project" token (possible now that vignemale exists on PyPI).
      - name: publish to PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
