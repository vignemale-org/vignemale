name: Release PyPI

# Publie sur PyPI sur tag de version (vX.Y.Z) :
#   - vignemale : wheels abi3 multi-plateformes (runtime Rust+PyO3 + CLI inclus) + sdist
# Auth : Trusted Publishing (OIDC, pas de token) — configurer le publisher sur
# PyPI (et/ou TestPyPI) pour le projet `vignemale` (org vignemale-org / repo
# vignemale / ce workflow / environnement « pypi »).
#
# - tag vX.Y.Z         → publie sur PyPI (réel)
# - run manuel (UI)    → choisir la cible : testpypi (essai blanc) ou pypi

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Cible de publication"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  # ---- wheels du runtime (abi3 : un wheel par plateforme couvre Python ≥ 3.9) ----
  wheels:
    name: wheels ${{ matrix.os }}/${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-latest, target: aarch64 }
          - { os: macos-13, target: x86_64 }
          - { os: macos-14, target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4

      # protoc sur les runners mac/windows (Linux : installé dans le conteneur
      # manylinux par before-script-linux ci-dessous).
      - if: runner.os != 'Linux'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: runtimes/python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          # conteneur manylinux : protoc récent (types bien-connus dans ../include)
          # pour build.rs/prost. On EXTRAIT avec Python (présent : /opt/python/cp39)
          # — pas d'unzip ni de gestionnaire de paquets (le conteneur aarch64 est
          # CentOS 7 EOL, yum HS). Plus besoin d'OpenSSL : TLS Postgres en rustls.
          before-script-linux: |
            PB=28.3
            curl -sSLO https://github.com/protocolbuffers/protobuf/releases/download/v${PB}/protoc-${PB}-linux-x86_64.zip
            /opt/python/cp39-cp39/bin/python -c "import zipfile; zipfile.ZipFile('protoc-${PB}-linux-x86_64.zip').extractall('/usr/local')"
            chmod +x /usr/local/bin/protoc
            /usr/local/bin/protoc --version

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: runtimes/python/dist/*.whl

  # ---- sdist du runtime + paquets pur-Python (cli, deploy) ----
  sdist-pure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: sdist du runtime (SDK + CLI dans un seul paquet)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: runtimes/python
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: runtimes/python/dist/*

  # ---- publication PyPI (Trusted Publishing, OIDC) ----
  publish:
    needs: [wheels, sdist-pure]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      # essai blanc : run manuel avec target=testpypi
      - name: publier sur TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

      # réel : sur tag vX.Y.Z, ou run manuel avec target=pypi
      - name: publier sur PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
